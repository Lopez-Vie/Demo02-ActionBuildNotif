name: Test and Build

on: [workflow_dispatch]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Verification des fichiers du runner
        run: ls -a -l

      - name: Clone du projet dans le runner (via actions/checkout)
        uses: actions/checkout@v6

      - name: Verification des fichiers après l'action "checkout"
        run: ls -a -l

      - name: Installation de l'environnement Node.js
        uses: actions/setup-node@v6

      - name: Installation de dépendences (node_modules)
        run: npm ci

      - name: Lancement des tests unitaires
        run: npm run test

      - name: Mailage en cas de foirage du testage
        if: failure()
        uses: ksatriow/action-mailer@v1.0.0
        with:
          smtp-server: ${{ vars.SMTP_SERVER }}
          smtp-port: ${{ vars.SMTP_PORT }}
          from-email: ${{ secrets.FROM_EMAIL}}
          to-email: digitalcity@yopmail.com
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚀 Deployment Fail!"
          html-template: "<h1>Your deployment is not good my friends</h1>!" 
        

      - name : Buildation du code TS vers le JS
        run: npm run build

      - name: Verifier le resultat de la buildation (Projet "Hello world")
        run: npm run start